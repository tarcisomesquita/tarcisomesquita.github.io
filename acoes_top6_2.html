<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8">
  <title>Ações mais negociadas</title>
  <meta name="description" content="Ações mais negociadas com preço menor que R$5,00">
  <meta name="viewport" content="width=device-width,initial-scale=1">

<style>
.grid-container {
  display: grid;
  grid-template-rows: repeat(2, 1fr);
  grid-template-columns: repeat(3, 1fr));
  gap: 5px;
	height: 100vh;
}

.c11 { grid-row: 1; grid-column: 1; }
.c12 { grid-row: 1; grid-column: 2; }
.c13 { grid-row: 1; grid-column: 3; }
.c21 { grid-row: 2; grid-column: 1; }
.c22 { grid-row: 2; grid-column: 2; }
.c23 { grid-row: 2; grid-column: 3; }

.cell {
  width: 100%;
  height: 49vh;
}

iframe {
  width: 100%;
  height: 100%;
}
</style>

</head>

<body>

<div class="grid-container">
<iframe class="cell c11" src="https://www.tradingview.com/bovespa/widgetembed/?style=3&withdateranges=1&locale=br&range=1D&symbol=COGN3" title="COGN3" frameborder="0" allowfullscreen></iframe>
<iframe class="cell c12" src="https://www.tradingview.com/bovespa/widgetembed/?style=3&withdateranges=1&locale=br&range=1D&symbol=AMER3" title="AMER3" frameborder="0" allowfullscreen></iframe>
<iframe class="cell c13" src="https://www.tradingview.com/bovespa/widgetembed/?style=3&withdateranges=1&locale=br&range=1D&symbol=AZEV4" title="AZEV4" frameborder="0" allowfullscreen></iframe>
	
<iframe class="cell c21" src="https://www.tradingview.com/bovespa/widgetembed/?style=3&withdateranges=1&locale=br&range=1D&symbol=GOLL4" title="GOLL4" frameborder="0" allowfullscreen></iframe>
<iframe class="cell c22" src="https://www.tradingview.com/bovespa/widgetembed/?style=3&withdateranges=1&locale=br&range=1D&symbol=QUAL3" title="QUAL3" frameborder="0" allowfullscreen></iframe>
<iframe class="cell c23" src="https://www.tradingview.com/bovespa/widgetembed/?style=3&withdateranges=1&locale=br&range=1D&symbol=AZEV3" title="AZEV3" frameborder="0" allowfullscreen></iframe>
</div>

</body>
</html>
