<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8">
  <title>Ações mais negociadas</title>
  <meta name="description" content="Ações mais negociadas com preço menor que R$2,00">
  <meta name="viewport" content="width=device-width,initial-scale=1">

<script src="https://tarcisomesquita.github.io/log.js" defer></script>

<style>
.grid-container {
  display: grid;
  grid-template-columns: repeat(2, 1fr));
  grid-template-rows: repeat(2, 1fr);
  gap: 5px;
  height: 100vh;
}

.c11 { grid-row: 1; grid-column: 1; }
.c12 { grid-row: 1; grid-column: 2; }
.c21 { grid-row: 2; grid-column: 1; }
.c22 { grid-row: 2; grid-column: 2; }

.cell {
  width: 100%;
  height: 49vh;
}

iframe {
  width: 100%;
  height: 100%;
}
</style>

</head>

<body>

<div class="grid-container" id="container">
</div>

<script>
function html2array(codigoFonte) {
  // https://developer.mozilla.org/en-US/docs/Web/JavaScript/Guide/Regular_expressions
  let csv = String(codigoFonte)
    .replace(/^.*<table[^>]*>/s, '').replace(/<\/table>.*$/s, '')
    .replace(/[\n\r\t ]{1,}</mg, '<').replace(/>[\n\r\t ]{1,}/mg, '>')
    .replace(/<tr/g, '\n<tr')
    .replace(/<t[dh][^>]*>/g, '<>')
    .replace(/<[^>]{1,}>/g, '')
    .replace(/&#193;/g, 'Á').replace(/&#194;/g, 'Â').replace(/&#195;/g, 'Ã')
    .replace(/&#199;/g, 'Ç')
    .replace(/&#201;/g, 'É').replace(/&#202;/g, 'Ê')
    .replace(/&#205;/g, 'Í')
    .replace(/&#211;/g, 'Ó').replace(/&#212;/g, 'Ô').replace(/&#213;/g, 'Õ')
    .replace(/&#218;/g, 'Ú');
  
  const csvN = csv.split('\n');
  let returnArray = [];
  for (let i = 0; i < csvN.length; i++) {
    returnArray[i] = csvN[i].split('<>');
  }
  return returnArray;
}

async function atualizar() {
  let text = '';
  try {
    const response = await fetch(
      'https://www.dadosdemercado.com.br/bolsa/acoes', 
      {
        mode: 'no-cors'
      }
    );
    text = await response.text();
  } catch (error) {
    container.innerHTML = `<p>${error}</p>`;
  }
  
  const returnArray = html2array(text);
  
  let ultima, negocios, top = [];
  for (let i = 2; i < returnArray.length; i++) {
    ultima = parseFloat(returnArray[i][4].replace(',', '.'));
    negocios = parseInt(returnArray[i][3].replace(/[.]/g, ''));
    
    if (ultima < 2 && negocios > 1000000) {
      let classificacao = Math.trunc(negocios * ultima).toString().padStart(9, '0');
      top.push([classificacao, returnArray[i][1], returnArray[i][4]]);
    }
  }

  top = top.sort().reverse();
  console.log(JSON.stringify(top).replace(/\[/g, '\n['));
  
  container.innerHTML = `
<iframe class="cell c11" src="https://www.tradingview.com/bovespa/widgetembed/?style=3&withdateranges=1&locale=br&range=1D&symbol=${top[0][1]}" title="${top[0][1]}" frameborder="0" allowfullscreen></iframe>
<iframe class="cell c12" src="https://www.tradingview.com/bovespa/widgetembed/?style=3&withdateranges=1&locale=br&range=1D&symbol=${top[1][1]}" title="${top[1][1]}" frameborder="0" allowfullscreen></iframe>
<iframe class="cell c21" src="https://www.tradingview.com/bovespa/widgetembed/?style=3&withdateranges=1&locale=br&range=1D&symbol=${top[2][1]}" title="${top[2][1]}" frameborder="0" allowfullscreen></iframe>
<iframe class="cell c22" src="https://www.tradingview.com/bovespa/widgetembed/?style=3&withdateranges=1&locale=br&range=1D&symbol=${top[3][1]}" title="${top[3][1]}" frameborder="0" allowfullscreen></iframe>
`;
}

await atualizar();
</script>
</body>
</html>
