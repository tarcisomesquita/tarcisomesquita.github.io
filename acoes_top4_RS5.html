<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8">
  <title>Ações mais negociadas</title>
  <meta name="description" content="Ações mais negociadas com preço menor que R$5,00">
  <meta name="viewport" content="width=device-width,initial-scale=1">

<style>
.grid-container {
  display: grid;
  grid-template-columns: repeat(2, 1fr));
  grid-template-rows: repeat(2, 1fr);
  gap: 5px;
  height: 100vh;
}

.c11 { grid-row: 1; grid-column: 1; }
.c12 { grid-row: 1; grid-column: 2; }
.c21 { grid-row: 2; grid-column: 1; }
.c22 { grid-row: 2; grid-column: 2; }

.cell {
  width: 100%;
  height: 49vh;
}

iframe {
  width: 100%;
  height: 100%;
}
</style>

</head>

<body>

<div class="grid-container">
<iframe class="cell c11" src="https://www.tradingview.com/bovespa/widgetembed/?style=3&withdateranges=1&locale=br&range=1D&symbol=HAPV3" title="HAPV3" frameborder="0" allowfullscreen></iframe>
<iframe class="cell c12" src="https://www.tradingview.com/bovespa/widgetembed/?style=3&withdateranges=1&locale=br&range=1D&symbol=JHSF3" title="JHSF3" frameborder="0" allowfullscreen></iframe>
<iframe class="cell c21" src="https://www.tradingview.com/bovespa/widgetembed/?style=3&withdateranges=1&locale=br&range=1D&symbol=COGN3" title="COGN3" frameborder="0" allowfullscreen></iframe>
<iframe class="cell c22" src="https://www.tradingview.com/bovespa/widgetembed/?style=3&withdateranges=1&locale=br&range=1D&symbol=PCAR3" title="PCAR3" frameborder="0" allowfullscreen></iframe>
</div>

</body>
</html>
