<meta name="description" content="Ambiente para alunos do CEEJA acompanharem seu progresso no curso">

<script src="https://accounts.google.com/gsi/client" async defer></script>

<script>
// https://console.cloud.google.com/auth/overview?project=planilhaceeja-id
// https://developers.google.com/identity/gsi/web/reference/html-reference

const scriptId = 'AKfycbzTDlG4n22NieuQI2sZWtsAGwiW9Xn6Aa08_05Oe5u3MRooZDDvZbESiCmZs_gxXerpMg'; // provas3

let ra;
let esc;
const queryString = window.location.search;
const urlParams = new URLSearchParams(queryString);
ra = urlParams.get('ra');
esc = urlParams.get('esc');

function handleCredentialResponse(response) {
  let styleSheet = null;
  let ruleIndex = -1;
  
  for (let i = 0; i < document.styleSheets.length; i++) {
    const sheet = document.styleSheets[i];
    try {
      const rules = sheet.cssRules || sheet.rules; // compatibilidade
      for (let j = 0; j < rules.length; j++) {
        const rule = rules[j];
        if (rule.selectorText === '.tela-cheia') {
          styleSheet = sheet;
          ruleIndex = j;
          break;
        }
      }
    }
    catch (e) {
      continue;
    }
    if (styleSheet) break;
  }
  
  if (styleSheet && ruleIndex !== -1) {
    styleSheet.deleteRule(ruleIndex);
    styleSheet.insertRule(
      `.tela-cheia {
          position: fixed;
          inset: 0;           /* top:0; right:0; bottom:0; left:0; */
          display: flex;
          align-items: center;
          justify-content: center;
          background: #fff;
      }`, 
      ruleIndex
    );
  }
  
  const existing = document.querySelector('.tela-cheia');
  if (existing) existing.remove();
  
  const div = document.createElement('div');
  div.className = 'tela-cheia';
  div.setAttribute('role', 'img');
  div.setAttribute('aria-label', 'Ampulheta animada');
  
  const img = document.createElement('img');
  img.src = 'https://tarcisomesquita.github.io/ceejapd/img/ampulheta.gif';
  img.alt = 'Ampulheta animada';
  
  div.appendChild(img);
  document.body.appendChild(div);
  
  //window.location.href = `https://script.google.com/macros/s/${scriptId}/exec?esc=${esc}&ra=${ra}&id_token=${response.credential}`;
  window.location.href = `https://script.google.com/macros/s/AKfycbygi2SS3-1hvMTVJuLiR80fIrPP17tYKpC09LAQhsNK/dev?esc=${esc}&ra=${ra}&id_token=${response.credential}`;
}
// https://console.cloud.google.com/auth/overview?project=planilhaceeja-id
</script>

<style>
body {
  margin: 0;
  height: 100vh;          /* ocupa toda a altura da tela */
  display: flex;
  flex-direction: column; /* empilha conteúdo e footer */
  
  font-family: 'Open Sans',sans-serif;
  color: #000000;
  font-size: 1em;
  line-height: 1.44em;
  background-color: #FFFFFF;
}

.tela-cheia {
  flex: 0.95; /* ocupa % do espaço disponível acima do footer */
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}
</style>

</head>

<body>
<div class="tela-cheia">
<h2>Acessar os roteiros</h2>

<p>Use sua conta Google para entrar.</p>

<div id="g_id_onload" data-client_id="453193392660-ftlj3r3c0s9vkembqckaub69fgnau7rm.apps.googleusercontent.com" data-callback="handleCredentialResponse" data-auto_select="true"></div>
<div 
 id="login"
 class="g_id_signin"
 data-type="standard"

 data-size="medium"
 data-locale="pt-BR"
 data-logo_alignment="center"
 data-width="280"
></div>



</div><!-- tela-cheia -->
