<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Livro caixa</title>
  <meta name="description" content="Auxilia no controle de fluxo de caixa.">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <script src="https://tarcisomesquita.github.io/log.js" onload="logsend()" async defer></script>
  
  <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
  <link rel="manifest" href="manifest.json">
</head>

<body>

<form>
  <label for="data">Data (dd/mm/aaaa):</label><input type="text" id="data" name="data" pattern="^(0[1-9]|[12][0-9]|3[01])\/(0[1-9]|1[012])\/(19|20)\d\d$" required><br>
  <br>
  <label for="valor">Valor em Dinheiro:</label><input type="number" id="valor" name="valor" step="0.01" min="0" required><br>
  <br>
  <label for="tipo">Tipo:</label>
  <select id="tipo" name="tipo" required>
    <option value="entrada">Entrada</option>
    <option value="saida">Saída</option>
  </select><br>
  <br>
  <label for="descricao">Descrição (Opcional):</label>
  <textarea id="descricao" name="descricao"></textarea><br>
  <br>
  <input type="submit" value="Enviar">
</form>

<script>
document.querySelector('form').addEventListener('submit', function(event) {
  event.preventDefault(); // Impede o envio do formulário
  
  const data = {
    data: document.getElementById('data').value,
    valor: document.getElementById('valor').value,
    tipo: document.getElementById('tipo').value,
    descricao: document.getElementById('descricao').value
  };
  
  const dataString = JSON.stringify(data);
  
  localStorage.setItem('dados', dataString);
  
  this.reset(); // Limpa o formulário (opcional)
});
</script>

</body>
</html>
