<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8">
  <title>Ações mais negociadas</title>
  <meta name="description" content="Ações mais negociadas com preço menor que R$5,00">
  <meta name="viewport" content="width=device-width,initial-scale=1">

<style>
.grid-container {
  display: grid;
  grid-template-columns: repeat(3, 1fr));
  grid-template-rows: repeat(2, 1fr);
  gap: 5px;
	height: 100vh;
}

.one {
  grid-column: 1;
  grid-row: 1;
  width: 100%;
  height: 100%;
}
.two {
  grid-column: 2;
  grid-row: 1;
  width: 100%;
  height: 100%;
}
.three {
  grid-column: 3;
  grid-row: 1;
  width: 100%;
  height: 100%;
}
.four {
  grid-column: 1;
  grid-row: 2;
  width: 100%;
  height: 100%;
}
.five {
  grid-column: 2;
  grid-row: 2;
  width: 100%;
  height: 100%;
}
.six {
  grid-column: 3;
  grid-row: 2;
  width: 100%;
  height: 100%;
}

iframe {
  width: 100%;
  height: 100%;
}
</style>

</head>

<body>

<div class="grid-container">
<iframe class="one" src="https://www.tradingview.com/bovespa/widgetembed/?style=3&withdateranges=1&locale=br&range=5D&symbol=HAPV3" title="HAPV3" frameborder="0" allowfullscreen></iframe>
<iframe class="two" src="https://www.tradingview.com/bovespa/widgetembed/?style=3&withdateranges=1&locale=br&range=5D&symbol=COGN3" title="COGN3" frameborder="0" allowfullscreen></iframe>
<iframe class="three" src="https://www.tradingview.com/bovespa/widgetembed/?style=3&withdateranges=1&locale=br&range=5D&symbol=PCAR3" title="PCAR3" frameborder="0" allowfullscreen></iframe>
	
<iframe class="four" src="https://www.tradingview.com/bovespa/widgetembed/?style=3&withdateranges=1&locale=br&range=5D&symbol=LWSA3" title="LWSA3" frameborder="0" allowfullscreen></iframe>
<iframe class="five" src="https://www.tradingview.com/bovespa/widgetembed/?style=3&withdateranges=1&locale=br&range=5D&symbol=PETZ3" title="PETZ3" frameborder="0" allowfullscreen></iframe>
<iframe class="six" src="https://www.tradingview.com/bovespa/widgetembed/?style=3&withdateranges=1&locale=br&range=5D&symbol=CVCB3" title="CVCB3" frameborder="0" allowfullscreen></iframe>
</div>
